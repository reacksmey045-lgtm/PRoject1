<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
           <link rel="stylesheet" href="../style/table.css">
    </head>
    <body>
        <form>
            <fieldset>
                <legend>
                    <h2>Info</h2>
                </legend>
                <table cellpadding="10" align="center">
                    <caption>
                        <h1>Create New Booking</h1>
                    </caption>
                    <tr>
                        <td><label>CustomerName</label></td>
                        <td>:</td>
                        <td>
                            <input type="text" piaceholder="type here..." required>
                        </td>
                    </tr>
                    <tr>
                        <td><label>Tel</label></td>
                        <td>:</td>
                        <td>
                            <input type="text" piaceholder="type here..." required>
                        </td>
                    </tr>
                    <tr>
                        <td><label>Gender</label></td>
                        <td>:</td>
                        <td>
                            <input type="radio" name="txtGender" value="male">male
                        </td>
                    </tr>
                    <tr>
                        <td><label>ID Card / Passport</label></td>
                        <td>:</td>
                        <td>
                            <input type="file">
                        </td>
                    </tr>
                    <tr>
                        <td><labe>Check In</labe></td>
                        <td>:</td>
                        <td>
                            <input type="date">
                        </td>
                    </tr>
                    <tr>
                        <td><labe>Check In</labe></td>
                        <td>:</td>
                        <td>
                            <input type="date">
                        </td>
                    </tr>
                    <tr>
                        <td><labe>Check Out</labe></td>
                        <td>:</td>
                        <td>
                            <input type="date">
                        </td>
                    </tr>
                    <tr>
                        <td><labe>Room Number</labe></td>
                        <td>:</td>
                        <td>
                            <select>
                                <optgroup label="Single Room">
                                    <option>101</option>
                                    <option>102</option>
                                    <option>103</option>
                                </optgroup>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <select>
                                <optgroup lebel="Double Room">
                                    <option>201</option>
                                    <option>202</option>
                                    <option>203</option>
                                </optgroup>
                            </select>
                    </tr>
                    <select>
                                <optgroup label="Family Room">
                                    <option>301</option>
                                    <option>302</option>
                                    <option>303</option>
                                </optgroup>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label> Total Amount</label></td>
                        <td>:</td>
                        <td><label>0</label></td>
                    </tr>
                    <tr>
                        <td><label>Payment Method</label></td>
                        <td>:</td>
                        <td><select>
                            <optgroup>Cash</optgroup>
                            <optgroup>ABA</optgroup>
                            <optgroup>Aceleda</optgroup>
                        </select>
                    </td>
                    </tr>
                    <tr>
                        <td><label>Booking Amount</label></td>
                        <td>:</td>
                        <td><input type="number">$</td>
                    </tr>
                    <tr>
                        <td><label>Note</label></td>
                        <td>:</td>
                        <td>
                            <textarea raw="3" cols="30" placeholder="type here"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td></td>
                        <td>
                            <input type="submit">
                            <input type="reset">
                        </td>
                    </tr>


                </table>
            </fieldset>
        </form>
    </body>
</html>
